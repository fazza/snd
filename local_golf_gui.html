<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golf Booking Bot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep:   #1a3a2a;
      --green-mid:    #2d5a3d;
      --green-bright: #4a8c5c;
      --green-light:  #7ab893;
      --cream:        #f5f0e8;
      --gold:         #c9a84c;
      --gold-light:   #e8c97a;
      --mono:         'DM Mono', monospace;
      --serif:        'Playfair Display', serif;
    }
    body {
      background: var(--green-deep);
      color: var(--cream);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(74,140,92,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
    }
    header { text-align: center; margin-bottom: 40px; }
    .flag-icon { font-size: 28px; animation: flagWave 3s ease-in-out infinite; display: inline-block; margin-bottom: 8px; }
    @keyframes flagWave { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    h1 { font-family: var(--serif); font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; letter-spacing: -0.02em; color: var(--cream); line-height: 1; }
    h1 span { color: var(--gold); }
    .subtitle { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--green-light); margin-top: 10px; }
    .gold-rule { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto 0; }

    /* ── Main booking form card ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      width: 100%;
      max-width: 680px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      margin-bottom: 24px;
    }
    .card-header {
      display: flex; align-items: center;
      background: var(--green-mid);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .card-header-title { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cream); opacity: 0.7; }
    .controls { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Round selector ── */
    .round-selector label { display: block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .select-wrapper { position: relative; }
    .select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); pointer-events: none; font-size: 0.8rem; }
    select {
      width: 100%; padding: 10px 36px 10px 14px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(201,168,76,0.25);
      border-radius: 3px; color: var(--cream); font-family: var(--mono); font-size: 0.8rem;
      appearance: none; cursor: pointer; transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: var(--gold); }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    .reload-btn {
      margin-top: 8px; background: none; border: 1px solid rgba(201,168,76,0.2);
      color: rgba(245,240,232,0.5); font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px;
      border-radius: 2px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .reload-btn:hover { border-color: var(--gold); color: var(--gold); }
    .reload-icon { display: inline-block; transition: transform 0.4s; }
    .reload-btn.spinning .reload-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Players ── */
    .section-label { display: block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .players-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .player-checkbox { display: none; }
    .player-label {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 10px 8px; border: 1px solid rgba(201,168,76,0.2); border-radius: 3px;
      cursor: pointer; transition: all 0.2s; background: rgba(0,0,0,0.2);
      font-size: 0.78rem; color: rgba(245,240,232,0.5); user-select: none;
    }
    .player-label:hover { border-color: rgba(201,168,76,0.5); color: var(--cream); }
    .player-checkbox:checked + .player-label { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--cream); }
    .player-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--green-mid); border: 2px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: border-color 0.2s; }
    .player-checkbox:checked + .player-label .player-avatar { border-color: var(--gold); background: var(--green-bright); }

    /* ── Action button ── */
    .btn-run {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
      border: 1px solid rgba(201,168,76,0.3); border-radius: 3px; color: var(--cream);
      font-family: var(--serif); font-size: 1rem; letter-spacing: 0.05em;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-run:hover:not(:disabled) { background: linear-gradient(135deg, var(--green-bright), #5aaa70); border-color: var(--gold); box-shadow: 0 0 20px rgba(74,140,92,0.3); transform: translateY(-1px); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Job cards ── */
    #jobs-container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }

    .job-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .job-header {
      background: var(--green-mid);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .job-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .job-dot.waiting  { background: var(--gold-light); animation: pulse 1.5s infinite; }
    .job-dot.running  { background: var(--gold); animation: pulse 0.8s infinite; }
    .job-dot.done     { background: var(--green-light); }
    .job-dot.error    { background: #e05555; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .job-title { font-family: var(--serif); font-size: 0.95rem; color: var(--cream); flex: 1; }
    .job-players { font-size: 0.65rem; color: var(--green-light); letter-spacing: 0.05em; }
    .job-dismiss { background: none; border: 1px solid rgba(245,240,232,0.12); color: rgba(245,240,232,0.35); font-family: var(--mono); font-size: 0.6rem; padding: 3px 8px; border-radius: 2px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
    .job-dismiss:hover { border-color: #e07777; color: #e07777; }

    /* countdown inside job card */
    .job-countdown {
      padding: 10px 18px 6px;
      display: none;
      flex-direction: column;
      gap: 2px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .job-countdown.visible { display: flex; }
    .job-countdown-value { font-size: 1.4rem; color: var(--gold-light); letter-spacing: 0.04em; }
    .job-countdown-label { font-size: 0.62rem; color: rgba(245,240,232,0.3); letter-spacing: 0.12em; }

    /* terminal inside job card */
    .job-terminal { padding: 14px 18px; height: 200px; overflow-y: auto; font-size: 0.75rem; line-height: 1.65; color: rgba(245,240,232,0.75); background: rgba(0,0,0,0.15); }
    .job-terminal::-webkit-scrollbar { width: 3px; }
    .job-terminal::-webkit-scrollbar-thumb { background: var(--green-bright); border-radius: 2px; }

    /* ── My Bookings modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e4030; border: 1px solid rgba(201,168,76,0.3);
      border-radius: 6px; width: 90%; max-width: 560px; max-height: 80vh;
      display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: slideIn 0.2s ease;
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid rgba(201,168,76,0.15);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-family: var(--serif); font-size: 1.1rem; color: var(--cream); }
    .modal-close { background: none; border: none; color: rgba(245,240,232,0.4);
      font-size: 1.2rem; cursor: pointer; padding: 4px 8px; transition: color 0.2s; }
    .modal-close:hover { color: var(--cream); }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .modal-body::-webkit-scrollbar { width: 3px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--green-bright); border-radius: 2px; }
    .booking-entry {
      padding: 12px 14px; border: 1px solid rgba(201,168,76,0.15);
      border-radius: 3px; margin-bottom: 8px; background: rgba(0,0,0,0.2);
    }
    .booking-entry-title { font-family: var(--serif); font-size: 0.9rem; color: var(--cream); margin-bottom: 3px; }
    .booking-entry-detail { font-size: 0.7rem; color: var(--green-light); }
    .modal-loading { text-align: center; padding: 32px; color: rgba(245,240,232,0.4); font-size: 0.8rem; letter-spacing: 0.1em; }
    .members-progress {
      padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .members-progress-title {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); opacity: 0.8;
    }
    .members-progress-bar-wrap {
      width: 100%; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2); border-radius: 2px; height: 6px; overflow: hidden;
    }
    .members-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--green-bright), var(--gold));
      transition: width 0.3s ease; border-radius: 2px;
    }
    .members-progress-letter {
      font-size: 1.8rem; font-family: var(--serif); color: var(--cream);
      min-height: 2.2rem; letter-spacing: 0.05em;
    }
    .members-progress-status {
      font-size: 0.68rem; color: rgba(245,240,232,0.4); letter-spacing: 0.1em;
    }
    .modal-empty { text-align: center; padding: 32px; color: rgba(245,240,232,0.3); font-size: 0.8rem; }
    .btn-bookings {
      background: none; border: 1px solid rgba(201,168,76,0.25);
      color: rgba(245,240,232,0.5); font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase; padding: 5px 12px;
      border-radius: 2px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-bookings:hover { border-color: var(--gold); color: var(--gold); }
    .log-line { display: block; }
    .log-line.success { color: var(--green-light); }
    .log-line.error   { color: #e07777; }
    .log-line.gold    { color: var(--gold-light); }
    .log-line.dim     { color: rgba(245,240,232,0.3); }

    /* booked result inside job card */
    .job-result { display: none; padding: 12px 18px; background: rgba(201,168,76,0.08); border-top: 1px solid rgba(201,168,76,0.25); }
    .job-result.visible { display: block; }
    .job-result-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .job-result-time { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; color: var(--cream); }
    .job-result-detail { font-size: 0.7rem; color: var(--green-light); margin-top: 2px; }

    /* ── Nav bar ── */
    .nav-bar {
      width: 100%; max-width: 680px;
      display: flex; justify-content: flex-end; gap: 8px;
      margin-bottom: 20px;
    }
    .nav-btn {
      background: none; border: 1px solid rgba(201,168,76,0.2);
      color: rgba(245,240,232,0.45); font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px;
      border-radius: 2px; cursor: pointer; transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Member Preferences modal ── */
    .prefs-list { display: flex; flex-direction: column; gap: 6px; }
    .prefs-member-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border: 1px solid rgba(201,168,76,0.1);
      border-radius: 3px; background: rgba(0,0,0,0.15);
    }
    .prefs-member-name { font-size: 0.78rem; color: var(--cream); flex: 1; }
    .prefs-toggle-group { display: flex; gap: 6px; }
    .prefs-btn {
      font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.08em;
      padding: 3px 10px; border-radius: 2px; cursor: pointer; border: 1px solid;
      transition: all 0.2s; text-transform: uppercase;
    }
    .prefs-btn.always {
      border-color: rgba(74,140,92,0.4); color: rgba(74,140,92,0.6);
      background: transparent;
    }
    .prefs-btn.always.active {
      border-color: var(--green-light); color: var(--green-deep);
      background: var(--green-light);
    }
    .prefs-btn.never {
      border-color: rgba(224,85,85,0.4); color: rgba(224,85,85,0.6);
      background: transparent;
    }
    .prefs-btn.never.active {
      border-color: #e05555; color: #fff;
      background: #e05555;
    }
    .prefs-btn.delete {
      border-color: rgba(245,240,232,0.15); color: rgba(245,240,232,0.3);
      background: transparent; padding: 3px 7px;
    }
    .prefs-btn.delete:hover {
      border-color: #e05555; color: #e05555;
      background: transparent;
    }
    .prefs-search {
      width: 100%; padding: 8px 12px; margin-bottom: 12px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 3px; color: var(--cream); font-family: var(--mono); font-size: 0.78rem;
    }
    .prefs-search:focus { outline: none; border-color: var(--gold); }
    .prefs-search::placeholder { color: rgba(245,240,232,0.25); }
    .prefs-section-label {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin: 10px 0 6px; opacity: 0.8;
    }
    .add-member-wrap { position: relative; margin-bottom: 16px; }
    .add-member-input {
      width: 100%; padding: 9px 14px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(201,168,76,0.25);
      border-radius: 3px; color: var(--cream); font-family: var(--mono); font-size: 0.78rem;
    }
    .add-member-input:focus { outline: none; border-color: var(--gold); }
    .add-member-input::placeholder { color: rgba(245,240,232,0.25); }
    .add-member-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
      background: #1e3d2c; border: 1px solid rgba(201,168,76,0.3);
      border-top: none; border-radius: 0 0 3px 3px;
      max-height: 200px; overflow-y: auto; display: none;
    }
    .add-member-dropdown.open { display: block; }
    .add-member-option {
      padding: 8px 14px; font-size: 0.78rem; color: var(--cream);
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .add-member-option:hover { background: rgba(201,168,76,0.1); }
    .add-member-option-btns { display: flex; gap: 6px; }
    .add-member-hint { font-size: 0.62rem; color: rgba(245,240,232,0.25); padding: 8px 14px; }
    .prefs-empty-hint {
      text-align: center; padding: 20px 16px 8px;
      font-size: 0.72rem; color: rgba(245,240,232,0.3); line-height: 1.6;
    }
    .refresh-cache-btn {
      background: none; border: 1px solid rgba(201,168,76,0.15);
      color: rgba(245,240,232,0.3); font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px;
      border-radius: 2px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .refresh-cache-btn:hover { border-color: var(--gold); color: var(--gold); }


    /* ── Login overlay ── */
    .login-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--green-deep);
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(74,140,92,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
      align-items: center; justify-content: center; flex-direction: column;
    }
    .login-overlay.open { display: flex; }
    .login-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.25);
      border-radius: 6px; width: 90%; max-width: 380px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5); overflow: hidden;
    }
    .login-header {
      background: var(--green-mid); padding: 20px 28px;
      border-bottom: 1px solid rgba(201,168,76,0.15); text-align: center;
    }
    .login-header h2 { font-family: var(--serif); font-size: 1.3rem; color: var(--cream); }
    .login-header p  { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green-light); margin-top: 4px; }
    .login-body { padding: 28px; display: flex; flex-direction: column; gap: 16px; }
    .login-field label { display: block; font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .login-field input {
      width: 100%; padding: 10px 14px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 3px; color: var(--cream); font-family: var(--mono); font-size: 0.85rem;
    }
    .login-field input:focus { outline: none; border-color: var(--gold); }
    .login-field input::placeholder { color: rgba(245,240,232,0.2); }
    .login-error { font-size: 0.72rem; color: #e07777; text-align: center; min-height: 1.1em; }
    .btn-login {
      width: 100%; padding: 12px; margin-top: 4px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
      border: 1px solid rgba(201,168,76,0.3); border-radius: 3px; color: var(--cream);
      font-family: var(--serif); font-size: 1rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-login:hover:not(:disabled) { border-color: var(--gold); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    /* ── User badge in nav ── */
    .user-badge {
      font-size: 0.65rem; letter-spacing: 0.08em; color: rgba(245,240,232,0.4);
      display: flex; align-items: center; gap: 8px;
    }
    .user-badge span { color: var(--green-light); }

    footer { margin-top: 32px; font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(245,240,232,0.2); text-align: center; text-transform: uppercase; }
  </style>
</head>
<body>

  <header>
    <div class="flag-icon">⛳</div>
    <h1>SND <span>Bookings</span></h1>
    <p class="subtitle">Lower your handicap and raise your DRS</p>
    <div class="gold-rule"></div>
  </header>

  <!-- Nav bar -->
  <div class="nav-bar">
    <div class="user-badge">Signed in as <span id="userBadgeName">…</span></div>
    <button class="nav-btn" onclick="openPrefs()">⚙️ Member Preferences</button>
    <button class="nav-btn" onclick="openBookings()">📋 My Bookings</button>
    <button class="nav-btn" onclick="doLogout()" style="border-color:rgba(224,85,85,0.3);color:rgba(224,85,85,0.6)">⬚ Sign Out</button>
  </div>

  <!-- Booking form -->
  <div class="card">
    <div class="card-header">
      <span class="card-header-title">New Booking</span>
    </div>
    <div class="controls">

      <div class="round-selector">
        <label for="roundSelect">What round do you want to book?</label>
        <div class="select-wrapper">
          <select id="roundSelect" disabled>
            <option value="">— Loading rounds… —</option>
          </select>
        </div>
        <button class="reload-btn" id="reloadBtn" onclick="loadEvents()">
          <span class="reload-icon">↻</span>
          <span id="reloadText">Refresh rounds</span>
        </button>
      </div>

      <div class="players-section">
        <label class="section-label">Who is playing?</label>
        <div class="players-grid">
          <input type="checkbox" class="player-checkbox" id="player-ross" value="Ross Farrelly" checked>
          <label class="player-label" for="player-ross"><span class="player-avatar">🏌️</span>Ross</label>

          <input type="checkbox" class="player-checkbox" id="player-dan" value="Daniel Pryor">
          <label class="player-label" for="player-dan"><span class="player-avatar">🏌️</span>Dan</label>

          <input type="checkbox" class="player-checkbox" id="player-jose" value="Jose De Sousa">
          <label class="player-label" for="player-jose"><span class="player-avatar">🏌️</span>Jose</label>

          <input type="checkbox" class="player-checkbox" id="player-hong" value="Hong Zhong">
          <label class="player-label" for="player-hong"><span class="player-avatar">🏌️</span>Hong</label>
        </div>
      </div>

      <button class="btn-run" id="btnRun" onclick="handleRun()" disabled>
        <span>🏌️</span><span id="btnLabel">Book Tee Time</span>
      </button>

    </div>
  </div>

  <!-- Job cards appear here -->
  <div id="jobs-container"></div>

  <footer>Members Only &mdash; Booking Bot v3</footer>

  <!-- My Bookings Modal -->
  <div class="modal-overlay" id="bookingsModal" onclick="if(event.target===this)closeBookings()">
    <div class="modal">
      <div class="modal-header">
        <h2>⛳ My Current Bookings</h2>
        <button class="modal-close" onclick="closeBookings()">✕</button>
      </div>
      <div class="modal-body" id="bookingsBody">
        <div class="modal-loading">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Member Preferences Modal -->
  <div class="modal-overlay" id="prefsModal" onclick="if(event.target===this)closePrefs()">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h2>⚙️ Member Preferences</h2>
        <button class="modal-close" onclick="closePrefs()">✕</button>
      </div>
      <div class="modal-body" id="prefsBody">
        <div class="modal-loading">⏳ Loading members…</div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid rgba(201,168,76,0.15);display:flex;justify-content:flex-end;gap:10px">
        <button id="btnSavePrefs" class="nav-btn" onclick="savePrefs()" style="border-color:rgba(74,140,92,0.5);color:var(--green-light)">✓ Save Preferences</button>
        <button class="nav-btn" onclick="closePrefs()">Cancel</button>
      </div>
    </div>
  </div>


  <!-- Login overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div style="text-align:center;margin-bottom:28px">
      <div class="flag-icon">⛳</div>
      <h1 style="font-family:var(--serif);font-size:2.4rem;font-weight:900;color:var(--cream)">
        SND <span style="color:var(--gold)">Bookings</span>
      </h1>
      <p style="font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--green-light);margin-top:8px">
        Members Only
      </p>
    </div>
    <div class="login-card">
      <div class="login-header">
        <h2>Sign In</h2>
        <p>Members Only</p>
      </div>
      <div class="login-body">
        <div class="login-field">
          <label>Member Number</label>
          <input id="loginUsername" type="text" placeholder="e.g. 4291" autocomplete="username">
        </div>
        <div class="login-field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Your club password" autocomplete="current-password">
        </div>
        <div class="login-error" id="loginError"></div>
        <button class="btn-login" id="btnLogin" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <script>
    const roundSelect = document.getElementById('roundSelect');
    const reloadBtn   = document.getElementById('reloadBtn');
    const reloadText  = document.getElementById('reloadText');
    const btnRun      = document.getElementById('btnRun');
    const btnLabel    = document.getElementById('btnLabel');
    const jobsContainer = document.getElementById('jobs-container');

    let eventsData = [];

    // ── Auth ─────────────────────────────────────────────
    async function checkSession() {
      try {
        const res  = await fetch('/me');
        const data = await res.json();
        if (data.logged_in) {
          showApp(data.name);
        } else {
          showLogin();
        }
      } catch(e) {
        showLogin();
      }
    }

    function showLogin() {
      document.getElementById('loginOverlay').classList.add('open');
      setTimeout(() => document.getElementById('loginUsername').focus(), 100);
    }

    function showApp(name) {
      document.getElementById('loginOverlay').classList.remove('open');
      const badge = document.getElementById('userBadgeName');
      if (badge) badge.textContent = name || 'Member';
      loadEvents();
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl    = document.getElementById('loginError');
      const btn      = document.getElementById('btnLogin');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Please enter your member number and password.'; return; }
      btn.textContent = 'Signing in…'; btn.disabled = true;
      try {
        const res  = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed.';
          btn.textContent = 'Sign In'; btn.disabled = false;
          return;
        }
        document.getElementById('loginPassword').value = '';
        showApp(data.name);
      } catch(e) {
        errEl.textContent = 'Cannot connect to server.';
        btn.textContent = 'Sign In'; btn.disabled = false;
      }
    }

    async function doLogout() {
      try { await fetch('/logout', { method: 'POST' }); } catch(e) {}
      // Reset all in-memory state
      eventsData = [];
      _memberCache = [];
      _cacheLoaded = false;
      _prefs = { always: [], never: [] };
      document.getElementById('jobs-container').innerHTML = '';
      roundSelect.innerHTML = '<option value="">— Loading rounds… —</option>';
      roundSelect.disabled = true;
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginError').textContent = '';
      document.getElementById('btnLogin').textContent = 'Sign In';
      document.getElementById('btnLogin').disabled = false;
      showLogin();
    }

    // Allow Enter key on login form
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('loginOverlay').classList.contains('open')) {
        doLogin();
      }
    });

    // ── Load rounds ──────────────────────────────────────
    async function openBookings() {
      document.getElementById('bookingsModal').classList.add('open');
      const body = document.getElementById('bookingsBody');
      body.innerHTML = '<div class="modal-loading">🔄 Logging in & fetching bookings…</div>';
      try {
        const res  = await fetch('/bookings');
        const data = await res.json();
        if (data.error) {
          body.innerHTML = `<div class="modal-empty">⚠️ ${data.error}</div>`;
          return;
        }
        const bookings = data.bookings || [];
        if (!bookings.length) {
          body.innerHTML = '<div class="modal-empty">No upcoming bookings found.</div>';
          return;
        }
        const isTime = s => /^\d{1,2}:\d{2}(am|pm)$/i.test(s.trim());
        const paired = [];
        for (let i = 0; i < bookings.length; i++) {
          const b = bookings[i];
          // Structured format from improved fetch script
          if (b.name || b.date) {
            paired.push(b);
          } else {
            // Legacy raw format - pair up time + name
            const a = (b.raw || '').trim();
            const next = (bookings[i+1]?.raw || '').trim();
            if (isTime(a) && next && !isTime(next)) {
              paired.push({ time: a, name: next }); i++;
            } else if (!isTime(a) && a) {
              paired.push({ time: '', name: a });
            }
          }
        }
        body.innerHTML = paired.length ? paired.map(p => `
          <div class="booking-entry">
            <div class="booking-entry-title" style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
              ${p.date ? `<span style="color:var(--green-light);font-size:0.75rem">${p.date}</span>` : ''}
              ${p.time ? `<span style="color:var(--gold-light);font-family:var(--mono);font-size:0.85rem">${p.time}</span>` : ''}
              <span>${p.name || p.raw || ''}</span>
            </div>
          </div>`).join('') : '<div class="modal-empty">No upcoming bookings found.</div>';
      } catch(e) {
        body.innerHTML = `<div class="modal-empty">⚠️ Cannot connect to server</div>`;
      }
    }

    function closeBookings() {
      document.getElementById('bookingsModal').classList.remove('open');
    }

    async function loadEvents() {
      roundSelect.disabled = true;
      btnRun.disabled = true;
      reloadBtn.classList.add('spinning');
      reloadText.textContent = 'Loading…';
      roundSelect.innerHTML = '<option value="">— Logging in & loading rounds… —</option>';
      try {
        const res  = await fetch('/events');
        const data = await res.json();
        if (data.error) {
          roundSelect.innerHTML = `<option value="">⚠️ Error: ${data.error}</option>`;
          return;
        }
        eventsData = data.events;
        roundSelect.innerHTML = '<option value="">— Select a round —</option>';
        if (!eventsData.length) {
          roundSelect.innerHTML = '<option value="">— No upcoming rounds found —</option>';
        } else {
          eventsData.forEach((ev, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${ev.status === 'OPEN' ? '🟢' : '🔒'} ${ev.label}`;
            roundSelect.appendChild(opt);
          });
        }
        roundSelect.disabled = false;
      } catch (e) {
        roundSelect.innerHTML = '<option value="">⚠️ Cannot connect to server</option>';
      } finally {
        reloadBtn.classList.remove('spinning');
        reloadText.textContent = 'Refresh rounds';
      }
    }

    roundSelect.addEventListener('change', () => {
      const ev = eventsData[parseInt(roundSelect.value)];
      if (!ev) { btnRun.disabled = true; return; }
      btnRun.disabled = false;
      btnLabel.textContent = ev.status === 'LOCKED' ? 'Schedule Booking' : 'Book Tee Time';
      btnRun.children[0].textContent = ev.status === 'LOCKED' ? '⏰' : '🏌️';
    });

    // ── Handle button click ──────────────────────────────
    function handleRun() {
      const idx = parseInt(roundSelect.value);
      const ev  = eventsData[idx];
      if (!ev) return;

      const players = Array.from(document.querySelectorAll('.player-checkbox:checked')).map(cb => cb.value);
      if (!players.length) { alert('Please select at least one player.'); return; }

      const jobId = 'job-' + Date.now();

      if (ev.status === 'LOCKED') {
        createJobCard(jobId, ev, players, 'waiting');
        scheduleJob(jobId, ev, players);
      } else {
        createJobCard(jobId, ev, players, 'running');
        executeJob(jobId, ev, players);
      }
    }

    // ── Create a job card ────────────────────────────────
    function createJobCard(jobId, ev, players, initialState) {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.id = jobId;
      card.innerHTML = `
        <div class="job-header">
          <div class="job-dot ${initialState}" id="${jobId}-dot"></div>
          <div>
            <div class="job-title">${ev.label}</div>
            <div class="job-players">👥 ${players.join(', ')}</div>
          </div>
          <button class="job-dismiss" onclick="dismissJob('${jobId}')">✕ Cancel</button>
        </div>
        <div class="job-countdown" id="${jobId}-countdown">
          <div class="job-countdown-value" id="${jobId}-countdown-value">—</div>
          <div class="job-countdown-label" id="${jobId}-countdown-label">—</div>
        </div>
        <div class="job-terminal" id="${jobId}-terminal" style="display:none"></div>
        <div class="job-result" id="${jobId}-result">
          <div class="job-result-label">⛳ Tee Time Booked</div>
          <div class="job-result-time" id="${jobId}-result-time">—</div>
          <div class="job-result-detail" id="${jobId}-result-detail"></div>
        </div>
      `;
      jobsContainer.prepend(card);
    }

    function jobLog(jobId, text) {
      const terminal = document.getElementById(`${jobId}-terminal`);
      if (!terminal) return;
      const placeholder = terminal.querySelector('.dim');
      if (placeholder) placeholder.remove();

      if (text.includes('Skipping')) return;
      const line = document.createElement('span');
      line.className = 'log-line';
      const isError = text.includes('❌') || text.toLowerCase().includes('error');
      if (text.includes('✅') || text.includes('confirmed') || text.includes('successful')) line.classList.add('success');
      else if (isError) line.classList.add('error');
      else if (text.includes('🚀') || text.includes('⛳') || text.includes('📧') || text.includes('Booking:')) line.classList.add('gold');
      else if (text.startsWith('   ')) line.classList.add('dim');
      // Only reveal terminal for errors
      if (isError) terminal.style.display = '';
      line.textContent = text;
      terminal.appendChild(line);
      terminal.appendChild(document.createElement('br'));
      terminal.scrollTop = terminal.scrollHeight;

      // Show booked result
      const timeMatch = text.match(/(\d{1,2}:\d{2}\s*[AP]M)/i);
      if ((text.includes('✅ Selected tee time') || text.includes('✅ Booking:')) && timeMatch) {
        const result = document.getElementById(`${jobId}-result`);
        if (result) {
          document.getElementById(`${jobId}-result-time`).textContent = timeMatch[1];
          result.classList.add('visible');
        }
      }
    }

    function setJobDot(jobId, state) {
      const dot = document.getElementById(`${jobId}-dot`);
      if (dot) dot.className = `job-dot ${state}`;
    }

    function dismissJob(jobId) {
      // Cancel running process on server if active
      fetch(`/cancel/${jobId}`, { method: 'POST' }).catch(() => {});
      // Cancel any countdown timer
      if (window._jobTimers && window._jobTimers[jobId]) {
        clearInterval(window._jobTimers[jobId]);
        delete window._jobTimers[jobId];
      }
      const card = document.getElementById(jobId);
      if (card) card.remove();
    }

    // ── Schedule a LOCKED job ────────────────────────────
    function scheduleJob(jobId, ev, players) {
      const roundDate = new Date(ev.date_iso + 'T00:00:00');
      const opensAt   = new Date(roundDate);
      opensAt.setDate(opensAt.getDate() - 7);
      opensAt.setHours(18, 30, 0, 0);
      const startAt   = new Date(opensAt.getTime() - 2 * 60 * 1000); // 2 mins before

      const countdownEl = document.getElementById(`${jobId}-countdown`);
      const valueEl     = document.getElementById(`${jobId}-countdown-value`);
      const labelEl     = document.getElementById(`${jobId}-countdown-label`);
      countdownEl.classList.add('visible');
      labelEl.textContent = `Polling starts ${opensAt.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'})} at 6:28 PM`;

      if (!window._jobTimers) window._jobTimers = {};

      window._jobTimers[jobId] = setInterval(() => {
        const diff = startAt - new Date();
        if (diff <= 0) {
          clearInterval(window._jobTimers[jobId]);
          delete window._jobTimers[jobId];
          countdownEl.classList.remove('visible');
          jobLog(jobId, `🚀 6:28 PM — starting polling now!`);
          setJobDot(jobId, 'running');
          executeJob(jobId, ev, players);
          return;
        }
        const days = Math.floor(diff / 86400000);
        const hrs  = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        let display = '';
        if (days > 0) display += `${days}d `;
        if (hrs > 0)  display += `${String(hrs).padStart(2,'0')}h `;
        display += `${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
        valueEl.textContent = display;
      }, 1000);
    }

    // ── Execute a booking job ────────────────────────────
    async function executeJob(jobId, ev, players) {
      setJobDot(jobId, 'running');
      jobLog(jobId, `🏌️  Booking: ${ev.label}`);
      jobLog(jobId, `👥  Players: ${players.join(', ')}`);

      try {
        const res = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ event: ev, players, job_id: jobId })
        });
        if (!res.ok) {
          const err = await res.json();
          jobLog(jobId, `❌ ${err.error || 'Could not start'}`);
          setJobDot(jobId, 'error');
          updateDismissBtn(jobId);
          return;
        }
      } catch (e) {
        jobLog(jobId, `❌ Cannot connect: ${e.message}`);
        setJobDot(jobId, 'error');
        updateDismissBtn(jobId);
        return;
      }

      const es = new EventSource(`/stream/${jobId}`);
      es.onmessage = (e) => {
        if (e.data === '__DONE__') {
          es.close();
          const terminal = document.getElementById(`${jobId}-terminal`);
          const hasError = terminal && terminal.querySelector('.error');
          const hasResult = document.getElementById(`${jobId}-result`)?.classList.contains('visible');
          setJobDot(jobId, hasResult ? 'done' : hasError ? 'error' : 'done');
          updateDismissBtn(jobId);
        } else if (e.data === '__TIMEOUT__') {
          es.close();
          jobLog(jobId, '⚠️ Stream timed out');
          setJobDot(jobId, 'error');
          updateDismissBtn(jobId);
        } else {
          jobLog(jobId, e.data);
        }
      };
      es.onerror = () => {
        es.close();
        jobLog(jobId, '⚠️ Connection lost');
        setJobDot(jobId, 'error');
        updateDismissBtn(jobId);
      };
    }

    function updateDismissBtn(jobId) {
      const btn = document.querySelector(`#${jobId} .job-dismiss`);
      if (btn) btn.textContent = '✕ Dismiss';
    }

    // ── Member Preferences ───────────────────────────────
    let _memberCache = [];   // full list from cache file (for search)
    let _cacheLoaded = false;
    let _prefs = { always: [], never: [] };

    async function openPrefs() {
      document.getElementById('prefsModal').classList.add('open');
      const body = document.getElementById('prefsBody');
      body.innerHTML = '<div class="modal-loading">⏳ Loading…</div>';

      // Always fetch fresh prefs from server
      try {
        const pRes = await fetch('/preferences');
        const pData = await pRes.json();
        _prefs = { always: pData.always || [], never: pData.never || [] };
      } catch(e) { /* non-fatal */ }

      // Load member cache for search (only fetches once per session)
      if (!_cacheLoaded) {
        try {
          const cRes = await fetch('/members/cached');
          const cData = await cRes.json();
          _memberCache = (cData.members || []).map(m => m.name || m).filter(Boolean).sort();
          _cacheLoaded = true;
        } catch(e) { /* non-fatal, search will show no-cache hint */ }
      }

      renderPrefs();
    }

    function renderPrefs() {
      const body = document.getElementById('prefsBody');
      const alwaysMembers = _prefs.always.slice().sort();
      const neverMembers  = _prefs.never.slice().sort();
      const hasAny = alwaysMembers.length || neverMembers.length;

      const esc = n => n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      const row = (name) => `
        <div class="prefs-member-row">
          <span class="prefs-member-name">${name}</span>
          <div class="prefs-toggle-group">
            <button class="prefs-btn always ${_prefs.always.includes(name) ? 'active' : ''}"
              data-name="${esc(name)}" data-type="always" onclick="togglePrefBtn(this)">Always</button>
            <button class="prefs-btn never ${_prefs.never.includes(name) ? 'active' : ''}"
              data-name="${esc(name)}" data-type="never" onclick="togglePrefBtn(this)">Never</button>
            <button class="prefs-btn delete" data-name="${esc(name)}" onclick="deletePrefBtn(this)" title="Remove">✕</button>
          </div>
        </div>`;

      let html = '';

      // Add-member search box at top
      html += `
        <div class="add-member-wrap">
          <input id="addMemberInput" class="add-member-input" placeholder="🔍 Search to add a member…" autocomplete="off"
            oninput="searchMemberToAdd(this.value)" onfocus="searchMemberToAdd(this.value)">
          <div id="addMemberDropdown" class="add-member-dropdown"></div>
        </div>`;

      if (alwaysMembers.length) {
        html += `<div class="prefs-section-label">✅ Always play with</div>`;
        html += alwaysMembers.map(row).join('');
      }
      if (neverMembers.length) {
        html += `<div class="prefs-section-label">🚫 Never play with</div>`;
        html += neverMembers.map(row).join('');
      }
      if (!hasAny) {
        html += `<div class="prefs-empty-hint">No preferences set yet.<br>Search above to add members.</div>`;
      }

      if (!_cacheLoaded || _memberCache.length === 0) {
        html += `<div style="text-align:center;margin-top:12px">
          <button class="refresh-cache-btn" onclick="refreshMemberCache()">↻ Build member list (takes ~2 min)</button>
        </div>`;
      } else {
        html += `<div style="text-align:center;margin-top:12px">
          <button class="refresh-cache-btn" onclick="refreshMemberCache()">↻ Refresh member list (${_memberCache.length} cached)</button>
        </div>`;
      }

      body.innerHTML = `<div class="prefs-list">${html}</div>`;

      // Re-attach dropdown close handler
      setTimeout(() => {
        const inp = document.getElementById('addMemberInput');
        if (inp) inp.focus();
      }, 50);
    }

    function searchMemberToAdd(q) {
      const dropdown = document.getElementById('addMemberDropdown');
      if (!dropdown) return;
      q = (q || '').trim();

      if (!q || q.length < 2) {
        dropdown.classList.remove('open');
        dropdown.innerHTML = '';
        return;
      }

      if (!_cacheLoaded || _memberCache.length === 0) {
        dropdown.innerHTML = '<div class="add-member-hint">No member cache yet — click "Build member list" below.</div>';
        dropdown.classList.add('open');
        return;
      }

      const ql = q.toLowerCase();
      const matches = _memberCache.filter(n => n.toLowerCase().includes(ql)).slice(0, 15);

      if (!matches.length) {
        dropdown.innerHTML = '<div class="add-member-hint">No members found.</div>';
        dropdown.classList.add('open');
        return;
      }

      const esc = n => n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      dropdown.innerHTML = matches.map(name => {
        const isAlways = _prefs.always.includes(name);
        const isNever  = _prefs.never.includes(name);
        const tag = isAlways ? '<span style="font-size:0.6rem;color:var(--green-light)">always</span>'
                  : isNever  ? '<span style="font-size:0.6rem;color:#e05555">never</span>'
                  : '';
        return `<div class="add-member-option">
          <span>${name} ${tag}</span>
          <div class="add-member-option-btns">
            <button class="prefs-btn always ${isAlways ? 'active' : ''}"
              data-name="${esc(name)}" data-type="always" onclick="addMemberPref(this)">Always</button>
            <button class="prefs-btn never ${isNever ? 'active' : ''}"
              data-name="${esc(name)}" data-type="never" onclick="addMemberPref(this)">Never</button>
          </div>
        </div>`;
      }).join('');
      dropdown.classList.add('open');
    }

    function addMemberPref(btn) {
      const name = btn.dataset.name;
      const type = btn.dataset.type;
      const other = type === 'always' ? 'never' : 'always';
      _prefs[other] = _prefs[other].filter(n => n !== name);
      if (_prefs[type].includes(name)) {
        _prefs[type] = _prefs[type].filter(n => n !== name);
      } else {
        _prefs[type].push(name);
      }
      // Refresh dropdown to show updated state, keep search term
      const inp = document.getElementById('addMemberInput');
      const q = inp ? inp.value : '';
      renderPrefs();
      // Restore search and reopen dropdown
      setTimeout(() => {
        const inp2 = document.getElementById('addMemberInput');
        if (inp2) { inp2.value = q; searchMemberToAdd(q); }
      }, 10);
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const wrap = document.querySelector('.add-member-wrap');
      if (wrap && !wrap.contains(e.target)) {
        const dd = document.getElementById('addMemberDropdown');
        if (dd) dd.classList.remove('open');
      }
    });

    function togglePrefBtn(btn) {
      const name = btn.dataset.name;
      const type = btn.dataset.type;
      const other = type === 'always' ? 'never' : 'always';
      _prefs[other] = _prefs[other].filter(n => n !== name);
      if (_prefs[type].includes(name)) {
        _prefs[type] = _prefs[type].filter(n => n !== name);
      } else {
        _prefs[type].push(name);
      }
      renderPrefs();
    }

    function deletePrefBtn(btn) {
      const name = btn.dataset.name;
      _prefs.always = _prefs.always.filter(n => n !== name);
      _prefs.never  = _prefs.never.filter(n => n !== name);
      renderPrefs();
    }

    async function refreshMemberCache() {
      const body = document.getElementById('prefsBody');
      body.innerHTML = `
        <div class="members-progress">
          <div class="members-progress-title">Refreshing Member Directory</div>
          <div class="members-progress-letter" id="mpLetter"></div>
          <div class="members-progress-bar-wrap">
            <div class="members-progress-bar" id="mpBar"></div>
          </div>
          <div class="members-progress-status" id="mpStatus">Connecting…</div>
        </div>`;

      const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      let doneLetters = 0;

      await new Promise((resolve, reject) => {
        const es = new EventSource('/members/stream');
        es.onmessage = (e) => {
          const line = e.data;
          if (line === '__DONE__') { es.close(); resolve(); return; }
          if (line.startsWith('MEMBERS_ERROR:')) { es.close(); reject(new Error(line.slice(14))); return; }
          if (line.startsWith('MEMBERS_JSON:')) {
            try {
              const members = JSON.parse(line.slice(13));
              _memberCache = members.map(m => m.name || m).filter(Boolean).sort();
              _cacheLoaded = true;
            } catch(_) {}
            return;
          }
          const letterMatch = line.match(/Scraping letter ([A-Z])/);
          const countMatch  = line.match(/([A-Z]):\s+(\d+) members/);
          const totalMatch  = line.match(/Total:\s+(\d+) members/);
          const letterEl = document.getElementById('mpLetter');
          const barEl    = document.getElementById('mpBar');
          const statusEl = document.getElementById('mpStatus');
          if (letterMatch && letterEl) {
            const letter = letterMatch[1];
            letterEl.textContent = letter;
            if (barEl) barEl.style.width = Math.round((LETTERS.indexOf(letter) / 26) * 100) + '%';
            if (statusEl) statusEl.textContent = 'Scanning ' + letter + '…';
          } else if (countMatch) {
            doneLetters++;
            if (barEl) barEl.style.width = Math.round((doneLetters / 26) * 100) + '%';
            if (statusEl) statusEl.textContent = countMatch[2] + ' members found under ' + countMatch[1];
          } else if (totalMatch) {
            if (barEl) barEl.style.width = '100%';
            if (statusEl) statusEl.textContent = totalMatch[1] + ' members total — finishing up…';
          }
        };
        es.onerror = () => { es.close(); reject(new Error('Stream connection lost')); };
      }).catch(err => {
        body.innerHTML = `<div class="modal-empty">⚠️ ${err.message}</div>`;
        return;
      });

      renderPrefs();
    }

    async function savePrefs() {
      const btn = document.getElementById('btnSavePrefs');
      if (btn) { btn.textContent = '⏳ Saving…'; btn.disabled = true; }
      try {
        const res = await fetch('/preferences', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(_prefs)
        });
        const body = await res.text();
        if (!res.ok) {
          let errMsg = 'Server returned ' + res.status;
          try { errMsg = JSON.parse(body).error || errMsg; } catch(_) {}
          alert('Save failed: ' + errMsg);
          return;
        }
        closePrefs();
      } catch(e) {
        alert('Could not save preferences: ' + e.message);
      } finally {
        if (btn) { btn.textContent = '✓ Save Preferences'; btn.disabled = false; }
      }
    }

    function closePrefs() {
      document.getElementById('prefsModal').classList.remove('open');
    }

    checkSession();
  </script>
</body>
</html>
