services:
  - type: web
    name: snd-bookings
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y google-chrome-stable
    startCommand: python3 golf_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_PASSWORD
        value: rg2024
      - key: SECRET_KEY
        value: change-me-to-something-random
      - key: RENDER
        value: true
